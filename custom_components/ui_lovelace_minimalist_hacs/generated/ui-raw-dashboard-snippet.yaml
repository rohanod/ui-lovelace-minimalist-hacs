        - grid-template-areas: "'l'"
      card:
        - border-radius: "18px"
        - box-shadow: >
            [[[
              if (hass.themes.darkMode){
                return "0px 2px 4px 0px rgba(0,0,0,0.80)";
              } else {
                return "var(--box-shadow)";
              }
            ]]]
        - height: "36px"
        - width: "auto"
        - padding-left: "6px"
        - padding-right: "6px"
    size: "80%"

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/internal_templates/cover.yaml
  ### Cover ###
  cover:
    tap_action:
      action: "more-info"
    icon: |
      [[[
          var icon = "mdi:help-circle";
          if (typeof states[entity.entity_id].attributes.current_position === "undefined"){
            if (states[entity.entity_id].state == "closed"){
              var icon = "mdi:window-shutter";
            } else
              var icon = "mdi:window-shutter-open";
          } else {
            if (states[entity.entity_id].attributes.current_position == 0){
              var icon = "mdi:window-shutter";
            } else
              var icon = "mdi:window-shutter-open";
          }
          return icon ;
      ]]]
    label: >-
      [[[
          var icon = "mdi:help-circle";
          if (typeof states[entity.entity_id].attributes.current_position === "undefined"){
            if (states[entity.entity_id].state == "closed"){
              return variables.ulm_translation_state;
            } else
              return variables.ulm_translation_state;
          } else {
            if (states[entity.entity_id].attributes.current_position == 0){
              return variables.ulm_translation_state;
            } else {
              return variables.ulm_translation_state + " • " + (states[entity.entity_id].attributes.current_position) + "%" ;
            }
          }
          return icon ;
      ]]]
    state:
      - operator: "template"
        value: "[[[ return states[entity.entity_id].attributes.current_position != 0; ]]]"
        styles:
          icon:
            - color: "rgba(var(--color-blue),1)"
          img_cell:
            - background-color: "rgba(var(--color-blue),0.2)"

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/internal_templates/edge.yaml
  ### Edge ###
  edge:
    styles:
      card:
        - width: "0px"

