                ha-card{
                  box-shadow: none;
                }
              $hui-history-graph-card$: >
                .content {
                  padding: 0 2.4em !important;
                }
                ha-card{
                  box-shadow: none;
                }
              $hui-glance-card$: >
                ha-card{
                  box-shadow: none;
                }
              $hui-map-card:
                $: >
                  ha-icon-button {
                    color: rgba(var(--color-blue),1);
                  }
                $ha-map:
                  $: >
                    .leaflet-control-attribution {
                      display: none;
                    }
