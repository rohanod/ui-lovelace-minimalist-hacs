                      size: >
                        [[[
                          const mediaQuery = window.matchMedia('(max-width: 800px)')
                          if (mediaQuery.matches) {
                            return 'fullscreen'
                          }
                        ]]]
                      content:
                        type: "custom:button-card"
                        template: "popup_light_color_temp"
                        entity: "[[[ return entity.entity_id; ]]]"
            item3:
              card:
                icon: "mdi:palette"
                type: "custom:button-card"
                template:
                  - "popup_button"
                  - "popup_button_color"
                styles:
                  card:
                    - display: >
