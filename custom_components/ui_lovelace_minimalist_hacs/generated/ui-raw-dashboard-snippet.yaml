  card_scenes_pill:
    show_icon: true
    show_label: false
    show_name: true
    variables:
      color_icon: "gray"
      color_bg: "gray"
    styles:
      grid:
        - grid-template-areas: "'i' 'n'"
        - grid-template-columns: "min-content"
        - grid-template-rows: "1fr 1fr"
        - row-gap: "12px"
        - justify-items: "center"
        - column-gap: "auto"
      card:
        - box-shadow: "none"
        - padding: "5px"
        - box-shadow: >
            [[[
              if (hass.themes.darkMode){
                return "0px 2px 4px 0px rgba(0,0,0,0.80)";
              } else {
                return "var(--box-shadow)";
              }
            ]]]
        - border-radius: "50px"
        - place-self: "center"
        - width: "52px"
        - height: "84px"
      icon:
        - color: >
            [[[
              var color = [variables.color_icon];
              if (color == "gray"){
                var color = "rgba(var(--color-theme),0.20)";
              } else if(color == "yellow"){
                var color = "rgba(var(--color-yellow),1)";
              } else if(color == "blue"){
                var color = "rgba(var(--color-blue),1)";
              } else if(color == "purple"){
                var color = "rgba(var(--color-purple),1)";
              } else if(color == "green"){
                var color = "rgba(var(--color-green),1)";
              } else if(color == "red"){
                var color = "rgba(var(--color-red),1)";
              }
              return color;
            ]]]
      img_cell:
        - background-color: >
            [[[
              var color = [variables.color_bg];
              if (color == "gray"){
                var color = "rgba(var(--color-theme),0.05)";
              } else if(color == "yellow"){
                var color = "rgba(var(--color-yellow),0.20)";
              } else if(color == "blue"){
                var color = "rgba(var(--color-blue),0.20)";
              } else if(color == "purple"){
                var color = "rgba(var(--color-purple),0.20)";
              } else if(color == "green"){
                var color = "rgba(var(--color-green),0.20)";
              } else if(color == "red"){
                var color = "rgba(var(--color-red),0.20)";
              }
              return color;
            ]]]
        - border-radius: "50%"
        - width: "42px"
        - height: "42px"
      name:
        - font-weight: "bold"
        - font-size: "9.5px"
        - width: "33px"
        - padding-bottom: "7px"
      state:
        - color: "rgba(var(--color-theme),0.9)"
