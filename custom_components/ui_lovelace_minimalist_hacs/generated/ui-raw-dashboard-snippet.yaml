        - height: "42px"
      name:
        - font-weight: "bold"
        - font-size: "10px"
        - filter: "opacity(40%)"
        - margin-bottom: "2px"
      state:
        - justify-self: "start"
        - margin-left: "5px"
        - font-size: "18px"
        - font-weight: 600
      icon:
        - color: "rgba(var(--color-theme),0.9)"
      img_cell:
        - justify-content: "right"
    size: "20px"
    color: "var(--google-grey)"

  car:
    template:
      - "icon_info"
    tap_action:
      action: "more-info"
    show_name: true
    show_last_changed: true
    name: "[[[ return variables.ulm_card_schumijo_car_name ]]]"
    entity: "[[[ return entity.entity_id ]]]"
    icon: "mdi:car"
    styles:
      icon:
        - color: "rgba(var(--color-theme),0.9)"
        - width: "20px"
        - place-self: "center"
      custom_fields:
        tracker:
          - border-radius: "50%"
          - position: "absolute"
          - left: "30px"
          - top: "-2px"
          - height: "16px"
          - width: "16px"
          - border: "2px solid var(--card-background-color)"
          - font-size: "12px"
          - line-height: "14px"
          - background-color: >
              [[[
                if (states[variables.ulm_card_schumijo_car_tracker].state != 'home'){
                  return "rgba(var(--color-green),1)";
                } else {
                  return "rgba(var(--color-blue),1)";
                }
              ]]]
        lock:
          - border-radius: "50%"
          - position: "absolute"
          - left: "30px"
          - top: "24px"
          - height: "16px"
          - width: "16px"
          - border: "2px solid var(--card-background-color)"
          - font-size: "12px"
          - line-height: "14px"
          - background-color: >
              [[[
                if (states[variables.ulm_card_schumijo_car_lock].state != 'locked'){
                  return "rgba(var(--color-red),1)";
                } else {
                  return "rgba(var(--color-blue),1)";
                }
              ]]]
    custom_fields:
      tracker: >
        [[[
          if (states[variables.ulm_card_schumijo_car_tracker].state != 'home'){
            return '<ha-icon icon="mdi:road-variant" style="width: 10px; height: 10px; color: var(--primary-background-color);"></ha-icon>';
          } else {
            return '<ha-icon icon="mdi:home-variant" style="width: 10px; height: 10px; color: var(--primary-background-color);"></ha-icon>';
          }
        ]]]
      lock: >
        [[[
          if (states[variables.ulm_card_schumijo_car_lock].state != 'locked'){
            return '<ha-icon icon="mdi:lock-open" style="width: 10px; height: 10px; color: var(--primary-background-color);"></ha-icon>';
          } else {
            return '<ha-icon icon="mdi:lock" style="width: 10px; height: 10px; color: var(--primary-background-color);"></ha-icon>';
          }
        ]]]

  ulm_custom_card_schumijo_ca_popup:
    tap_action:
      action: "fire-dom-event"
      browser_mod:
        service: "browser_mod.popup"
        data:
          size: >
            [[[
              const mediaQuery = window.matchMedia('(max-width: 800px)')
              if (mediaQuery.matches) {
                return 'fullscreen'
              }
            ]]]
          title: "Map"
          style:
            $: >
              [[[
                if (hass.themes.theme.includes("desktop")){
                  var dialog = `
                    .mdc-dialog__surface{
                      border-radius: var(--border-radius) !important;
                    }
                  `;
                } else{
                  var dialog = "";
                }
                return `
                  *{
                    --secondary-background-color: none !important;
                  }
                  ${dialog}
                `;
              ]]]
            hui-vertical-stack-card:
              $: >
                button-card {
                  align-self: center;
                  padding: 0.2em 0 2.3em 0;
                }
                hui-entities-card{
                  padding: 0.8em 1.4em;
                }
