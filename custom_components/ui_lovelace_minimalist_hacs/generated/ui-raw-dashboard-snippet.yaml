  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/internal_templates/icon_alert.yaml
  ### Icon Alert ###
  icon_alert:
    variables:
      ulm_icon_alert_color: "blue"
    color: "var(--google-grey)"
    show_icon: true
    show_label: false
    show_name: false
    state:
      - operator: "template"
        value: >
          [[[
            var check_state = 'on';
            if (variables.ulm_icon_alert_invert_state) {
              check_state = 'off';
            }
            if (entity.state == 'unavailable' || entity.state == check_state){ return true; }
          ]]]
        styles:
          icon:
            - color: "[[[ return `rgba(var(--color-${variables.ulm_icon_alert_color}), 1)`; ]]]"
          label:
