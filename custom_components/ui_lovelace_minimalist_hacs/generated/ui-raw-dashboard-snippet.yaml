        - font-size: "14px"
      img_cell:
        - background-color: "rgba(var(--color-theme),0.05)"
        - border-radius: "50%"
        - place-self: "center"
        - width: "42px"
        - height: "42px"
      grid:
        - grid-template-areas: "'i' 'n' 'l'"
      card:
        - border-radius: "var(--border-radius)"
        - box-shadow: "var(--box-shadow)"
        - padding: "10px 0px 8px 0px"
    size: "20px"

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/vertical_buttons/vertical_buttons_custom_state.yaml
  ### Vertical Buttons Custom State ###
  vertical_buttons_custom_state:
    template: "vertical_buttons"
    variables:
      state: "default"
      # blue, red, green, yellow, purple, pink
      color: "blue"
    show_last_changed: false
    name: "[[[ return variables.state ]]]"
    styles:
      name:
        - text-transform: "capitalize"
    state:
      - operator: "template"
        value: "[[[ return entity.state == variables.state ]]]"
        styles:
          icon:
            - color: "[[[ return `rgba(var(--color-${variables.color}), 1)`; ]]]"
          label:
            - color: "[[[ return `rgba(var(--color-${variables.color}-text), 1)`; ]]]"
          name:
            - color: "[[[ return `rgba(var(--color-${variables.color}-text), 1)`; ]]]"
          img_cell:
            - background-color: "[[[ return `rgba(var(--color-${variables.color}), 0.2)`; ]]]"
          card:
            - background-color: "[[[ return `rgba(var(--color-background-${variables.color}), var(--opacity-bg))`; ]]]"
    tap_action:
      action: "perform-action"
      perform_action: "input_select.select_option"
      target:
        entity_id: "[[[ return entity.entity_id ]]]"
      data:
        option: "[[[ return variables.state ]]]"

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/popup_templates/popup_buttons/popup_button.yaml
  popup_button:
    color: "var(--primary-color)"
    show_icon: true
    show_name: true
    styles:
      grid:
        - grid-template-areas: "'i' 'n'"
        - grid-template-columns: "auto"
        - grid-template-rows: "min-content min-content"
      card:
        - background: "none"
        - box-shadow: "none"
        - border-radius: "none"
        - padding: "12px"
      icon:
        - color: "var(--primary-color)"
      img_cell:
        - background-color: "var(--card-background-color)"
        - border-radius: "50%"
        - place-self: "center"
        - width: "42px"
        - height: "42px"
        - box-shadow: "var(--ha-card-box-shadow)"
      name:
        - justify-self: "center"
        - font-weight: "bold"
        - font-size: "14px"
        - margin-top: "12px"
        - white-space: "initial"
        - text-overflow: "initial"
        - overflow: "initial"

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/popup_templates/popup_buttons/popup_button_airconditionner.yaml
  popup_button_airconditionner:
    template: "widget_icon"
    variables:
      ulm_popup_button_airconditionner_state: "off"
    styles:
      card:
        - background-color: "transparent"
        - width: "42px"
        - border-radius: "50%"
    state:
      - styles:
          card:
            - background-color: "var(--card-background-color)"
            - box-shadow: "var( --ha-card-box-shadow)"
            - transform: "scale(0.95)"
        value: "[[[ return variables.ulm_popup_button_airconditionner_state ]]]"
    tap_action:
      action: "perform-action"
      perform_action: "climate.set_hvac_mode"
      target:
        entity_id: "climate.hvac"
      data:
        hvac_mode: "[[[ return variables.ulm_popup_button_airconditionner_state ]]]"

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/popup_templates/popup_buttons/popup_button_app.yaml
  popup_button_app:
    template:
      - "popup_button"
    show_name: true
    show_label: true
    styles:
      grid:
        - grid-template-areas: "'i n' 'i l'"
        - grid-template-columns: "min-content auto"
        - grid-template-rows: "min-content min-content"
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-weight: "bolder"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin-left: "12px"
      name:
        - align-self: "end"
        - justify-self: "start"
        - font-weight: "bold"
        - font-size: "14px"
        - margin-left: "12px"
        - margin-top: "0px"
      icon:
        - color: >
            [[[
              var color = "var(--color-theme)";
              if(entity?.attributes?.app_name){
                var app = entity.attributes?.app_name.toLowerCase();
                if(app = "spotify"){
                  var color = "#1DB954";
                }
              } else if(entity?.attributes?.media_content_id?.toLowerCase().includes("spotify")){
                var color = "#1DB954";
              }
              return color;
            ]]]
      img_cell:
        - border: "1px solid var(--color-theme)"
        - border-shadow: "none"
        - background-color: >
            [[[
              var color = "var(--color-theme)";
              if(entity?.attributes?.app_name){
                var app = entity?.attributes?.app_name?.toLowerCase();
                if(app = "spotify"){
                  var color = "#434343";
                }
              } else if(entity?.attributes?.media_content_id?.toLowerCase().includes("spotify")){
                var color = "#434343";
              }
              return color;
            ]]]
    icon: >
      [[[
        var icon =  entity.attributes.icon || "mdi:speaker";
        if(entity?.attributes?.app_name){
          var app = entity.attributes.app_name.toLowerCase();
          if(app == "spotify"){
            var icon = "mdi:spotify";
          } else if(app == "google podcasts"){
            var icon = "mdi:google-podcast";
          } else if(app == "plex"){
            var icon = "mdi:plex";
          } else if(app == "soundcloud"){
            var icon = "mdi:soundcloud";
          } else if(app == "youtube music"){
            var icon = "mdi:youtube";
          } else if (app == "oto music"){
            var icon = "mdi:music-circle";
          } else if(app == "pandora"){
            var icon = "mdi:pandora";
          } else if(app == "netflix"){
            var icon = "mdi:netflix";
          } else if(app == "bluetooth audio"){
            var icon = "mdi:bluetooth";
          }
        } else if(entity?.attributes?.media_content_id?.toLowerCase().includes("spotify")){
            var icon = "mdi:spotify";
        }
        return icon;
      ]]]
    label: >
      [[[
        var label = entity.attributes.media_title || entity.attributes.friendly_name;
        return label;
      ]]]
    name: >
      [[[
        var name =  entity.attributes.friendly_name;
        if(entity?.attributes?.app_name){
          var app = entity?.attributes?.app_name?.toLowerCase();
          if(app == "spotify"){
            var name = "Spotify";
          } else if(app == "google podcasts"){
            var name = "Google-Podcast";
          } else if(app == "plex"){
            var name = "Plex";
          } else if(app == "soundcloud"){
            var name = "Soundcloud";
          } else if(app == "youtube music"){
            var name = "Youtube";
          } else if (app == "oto music"){
            var name = "Oto Music";
          } else if(app == "pandora"){
            var name = "Pandora";
          } else if(app == "netflix"){
            var name = "Netflix";
          } else if(app == "bluetooth audio"){
            var name = "Bluetooth";
          }
        } else if(entity?.attributes?.media_content_id?.toLowerCase().includes("spotify")){
            var name = "Spotify";
        }
        return name;
      ]]]

