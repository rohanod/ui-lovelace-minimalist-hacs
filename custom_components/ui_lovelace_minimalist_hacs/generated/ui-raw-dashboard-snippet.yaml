            var color = colors[Math.floor(Math.random() * colors.length)];
            return color;
          ]]]
      entity_2:
        color: >
          [[[
            var colors = ['yellow', 'blue', 'red', 'purple','green', 'pink'];
            var color = colors[Math.floor(Math.random() * colors.length)];
            return color;
          ]]]
      entity_3:
        color: >
          [[[
            var colors = ['yellow', 'blue', 'red', 'purple','green', 'pink'];
            var color = colors[Math.floor(Math.random() * colors.length)];
            return color;
          ]]]
      entity_4:
        color: >
          [[[
            var colors = ['yellow', 'blue', 'red', 'purple','green', 'pink'];
            var color = colors[Math.floor(Math.random() * colors.length)];
            return color;
          ]]]
      entity_5:
        color: >
          [[[
            var colors = ['yellow', 'blue', 'red', 'purple','green', 'pink'];
            var color = colors[Math.floor(Math.random() * colors.length)];
            return color;
          ]]]
    show_icon: false
    show_label: true
    show_name: false
    styles:
      grid:
        - grid-template-areas: >
            [[[
              if(variables.ulm_card_esh_welcome_collapse && states[variables.ulm_card_esh_welcome_collapse].state == 'on'){
                return "\'item1\' \'item2\' ";
              } else {
                return "\'item1\' \'item2\' \'item3\'";
              }
            ]]]
        - grid-template-columns: "1fr"
        - grid-template-rows: "min-content min-content"
        - row-gap: "0px"
      card:
        - border-radius: "var(--border-radius)"
        - box-shadow: "var(--box-shadow)"
        - padding: "10px"
        - cursor: "default"
        - "--mdc-ripple-press-opacity": 0   # prevent click animation
      custom_fields:
        item3:
          - display: >
              [[[
                if(variables.ulm_card_esh_welcome_collapse && states[variables.ulm_card_esh_welcome_collapse].state == 'on'){
                  return "none";
                } else {
                  return "block";
                }
              ]]]
        item4:
          - display: >
              [[[
                if(variables.ulm_card_esh_welcome_collapse && states[variables.ulm_card_esh_welcome_collapse].state == 'on'){
                  return "none";
                } else {
                  return "block";
                }
              ]]]
    custom_fields:
      item1:
        card:
          type: "custom:button-card"
          template: "card_esh_welcome_topbar"
          variables:
            ulm_card_esh_welcome_collapse: "[[[ return variables.ulm_card_esh_welcome_collapse ]]]"
            ulm_weather: "[[[ return variables.ulm_weather]]]"
          styles:
            card:
              - border-radius: "none"
              - box-shadow: "none"
              - padding: "4px"
              - margin-left: "relative"
              - cursor: "default"
              - "--mdc-ripple-press-opacity": 0   # prevent click animation
      item2:
        card:
          type: "custom:button-card"
          show_icon: false
          show_label: false
          show_name: true
          show_entity_picture: false
          name: |
            [[[
              var today = new Date();
              var time = today.getHours()
              let welcome = '';
              if (time >= '18'){
                welcome = variables.ulm_evening;
              } else if (time >= '12'){
                welcome = variables.ulm_afternoon;
              } else if (time >= '5'){
                welcome = variables.ulm_morning;
              } else {
                welcome = variables.ulm_hello;
              }
              return welcome + ', ' + '   <br>' + user.name + '!';
            ]]]
          styles:
