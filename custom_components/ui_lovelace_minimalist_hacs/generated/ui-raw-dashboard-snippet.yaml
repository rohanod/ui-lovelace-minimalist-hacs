  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/vertical_buttons/vertical_buttons.yaml
  ### Vertical Buttons ###
  vertical_buttons:
    show_label: true
    label: "[[[ return (entity.attributes.value )]]]"
    styles:
      icon:
        - color: "rgba(var(--color-theme),0.2)"
      label:
        - justify-self: "center"
        - align-self: "start"
        - font-weight: "bolder"
        - font-size: "12px"
