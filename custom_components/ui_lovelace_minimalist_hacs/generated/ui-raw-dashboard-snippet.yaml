  # Source: custom_cards/custom_card_esh_room/custom_card_esh_room.yaml
  card_esh_room:
    tap_action:
      action: "more-info"
    color: "var(--google-grey-500)"
    show_icon: true
    show_name: true
    show_label: true
    template:
      - "ulm_translation_engine"
    size: "20px"
    variables:
      ulm_custom_card_esh_room_light_entity: null
      ulm_custom_card_esh_room_climate_entity: null
      ulm_custom_card_esh_room_cover_entity: null
      ulm_card_thermostat_enable_popup: false
      ulm_card_light_enable_popup: false
      ulm_card_cover_popup: false
      ulm_card_dynamic_color: false
      ulm_card_esh_room_light_icon_on: "mdi:lightbulb"
      ulm_card_esh_room_light_icon_off: "mdi:lightbulb-off"
      ulm_card_esh_room_cover_icon_open: "mdi:blinds-open"
      ulm_card_esh_room_cover_icon_closed: "mdi:roller-shade-closed"
      ulm_card_esh_room_cover_icon_closing: "mdi:blinds"
      ulm_card_esh_room_cover_icon_opening: "mdi:blinds"
    label: >-
      [[[
        var label_entity = variables.ulm_custom_card_esh_room_light_entity
          ? states[variables.ulm_custom_card_esh_room_light_entity]
          : entity;
        if (!label_entity) {
          return "<br />";
        } else if (label_entity.state == "on") {
          var bri = Math.round(label_entity.attributes.brightness / 2.55);
          return (bri ? bri + "%" : variables.ulm_translation_state);
        } else {
          return variables.ulm_translation_state;
        }
      ]]]
    styles:
      card:
        - border-radius: "20px"
        - box-shadow: "var(--box-shadow)"
        - padding: "12px"
        - background-color: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity) {
                var color = states[variables.ulm_custom_card_esh_room_light_entity].attributes.rgb_color;
                if (states[variables.ulm_custom_card_esh_room_light_entity].state == "on") {
                  if (color && variables.ulm_card_dynamic_color) {
                    return 'rgba(' + color + ', 0.2)';
                  }
                  return 'rgba(var(--color-background-yellow), 0.2)';
                }
              }
              return 'var(--ha-card-background, var(--card-background-color, white))';
            ]]]
      grid:
        - grid-template-areas: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity && variables.ulm_custom_card_esh_room_cover_entity) {
                return "'i light' 'n cover' 'l cover'";
              } else if (variables.ulm_custom_card_esh_room_light_entity && variables.ulm_custom_card_esh_room_climate_entity) {
                return "'i light' 'n climate' 'l climate'";
              } else if (variables.ulm_custom_card_esh_room_light_entity) {
                return "'i light' 'n n' 'l l'";
              } else if (variables.ulm_custom_card_esh_room_climate_entity) {
                return "'i .' 'n climate' 'l climate'";
              } else if (variables.ulm_custom_card_esh_room_cover_entity) {
                return "'i cover' 'n n' 'l l'";
              } else {
                return "'i .' 'n n' 'l l'";
              }
            ]]]
        - grid-template-columns: "1fr 1fr"
        - grid-template-rows: "min-content"
      icon:
        - filter: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity
                  && states[variables.ulm_custom_card_esh_room_light_entity].state == "on"
                  && variables.ulm_card_dynamic_color) {
                return "contrast(0.6) saturate(1.7)";
              }
            ]]]
        - color: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity) {
                var color = states[variables.ulm_custom_card_esh_room_light_entity].attributes.rgb_color;
                if (states[variables.ulm_custom_card_esh_room_light_entity].state == "on") {
                  if (color && variables.ulm_card_dynamic_color) {
                    return 'rgba(' + color + ', 1)';
                  }
                  return 'rgba(var(--color-yellow), 1)';
                }
              }
              return 'rgba(var(--color-theme), 0.2)';
            ]]]
      img_cell:
        - border-radius: "50%"
        - place-self: "flex-start"
        - width: "42px"
        - height: "42px"
        - margin-left: "12px"
        - background-color: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity) {
                var color = states[variables.ulm_custom_card_esh_room_light_entity].attributes.rgb_color;
                if (states[variables.ulm_custom_card_esh_room_light_entity].state == "on") {
                  if (color && variables.ulm_card_dynamic_color) {
                    return 'rgba(' + color + ', 0.3)';
                  }
                  return 'rgba(var(--color-yellow), 0.2)';
                }
              }
              return 'rgba(var(--color-theme), 0.05)';
            ]]]
      name:
        - align-self: "end"
        - justify-self: "start"
        - font-weight: "bold"
        - font-size: "14px"
        - margin-left: "12px"
        - margin-top: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity && variables.ulm_custom_card_esh_room_climate_entity) {
                return "8px";
              } else if (variables.ulm_custom_card_esh_room_light_entity) {
                return "12px";
              } else if (variables.ulm_custom_card_esh_room_climate_entity) {
                return "8px";
              } else if (variables.ulm_custom_card_esh_room_cover_entity) {
                return "8px";
              } else {
                return "12px";
              }
            ]]]
        - max-width: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity && variables.ulm_custom_card_esh_room_climate_entity) {
                return "85%";
              } else if (variables.ulm_custom_card_esh_room_light_entity) {
                return "100%";
              } else if (variables.ulm_custom_card_esh_room_climate_entity) {
                return "85%";
              } else if (variables.ulm_custom_card_esh_room_cover_entity) {
                return "85%";
              } else {
                return "100%";
              }
            ]]]
        - color: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity) {
                var color = states[variables.ulm_custom_card_esh_room_light_entity].attributes.rgb_color;
                if (states[variables.ulm_custom_card_esh_room_light_entity].state == "on") {
                  if (color && variables.ulm_card_dynamic_color) {
                    return 'rgba(' + color + ', 1)';
                  }
                  return 'rgba(var(color-yellow-text), 1)';
                }
                return 'rgba(var(--color-theme), 0.6)';
              }
              return 'rgba(var(--color-theme), 0.6)';
            ]]]
        - filter: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity
                  && states[variables.ulm_custom_card_esh_room_light_entity].state == "on"
                  && variables.ulm_card_dynamic_color) {
                return "contrast(0.6) saturate(1.7)";
              }
            ]]]
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-weight: "bolder"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin-left: "12px"
        - margin-bottom: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity && variables.ulm_custom_card_esh_room_climate_entity) {
                return "0px";
              } else if (variables.ulm_custom_card_esh_room_light_entity) {
                return "3px";
              } else if (variables.ulm_custom_card_esh_room_climate_entity) {
                return "0px";
              } else if (variables.ulm_custom_card_esh_room_cover_entity) {
                return "0px";
              } else {
                return "3px";
              }
            ]]]
        - max-width: >-
            [[[
              if (variables.ulm_custom_card_esh_room_light_entity && variables.ulm_custom_card_esh_room_climate_entity) {
                return "85%";
              } else if (variables.ulm_custom_card_esh_room_light_entity) {
                return "100%";
              } else if (variables.ulm_custom_card_esh_room_climate_entity) {
                return "85%";
              } else if (variables.ulm_custom_card_esh_room_cover_entity) {
                return "85%";
              } else {
                return "100%";
              }
            ]]]
      state:
        - justify-self: "start"
        - align-self: "start"
        - font-weight: "bolder"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin-left: "12px"
      custom_fields:
        light:
          - display: >
              [[[
                if (variables.ulm_custom_card_esh_room_light_entity) {
                    return "block";
                } else {
                    return "none";
                }
              ]]]
        climate:
          - display: >
              [[[
                if (variables.ulm_custom_card_esh_room_climate_entity) {
                  return "block";
                } else {
                  return "none";
                }
              ]]]
        cover:
          - display: >
              [[[
                if (variables.ulm_custom_card_esh_room_cover_entity) {
                  return "block";
                } else {
                  return "none";
                }
              ]]]
    custom_fields:
      light:
        card:
          entity: "[[[ return variables.ulm_custom_card_esh_room_light_entity ]]]"
          name: "[[[ return name ]]]"
          state:
            - value: "on"
