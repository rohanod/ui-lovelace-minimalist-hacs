            action = 'perform-action';
          }
          if (action == 'popup' && (variables.ulm_custom_popup != null )){
            let popup_config = variables.ulm_custom_popup;
            if ((typeof popup_config === 'object') && 'template' in popup_config) {
              action = 'fire-dom-event';
            }
          }

