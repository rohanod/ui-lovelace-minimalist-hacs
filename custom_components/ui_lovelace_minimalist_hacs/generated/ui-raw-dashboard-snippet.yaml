                    entity_id: "[[[ return entity.entity_id ]]]"
                  data: >
                    [[[
                      const unit = hass.config.unit_system.temperature;
                      const step = variables.ulm_card_thermostat_temp_step || entity.attributes.target_temp_step || (unit == '°F' ? 1.0 : 0.5);

                      // Check if entity supports dual-setpoint (target_temp_low/high)
                      if (entity.attributes.target_temp_low != null && entity.attributes.target_temp_high != null) {
                        return {
                          target_temp_low: entity.attributes.target_temp_low,
                          target_temp_high: (parseFloat(entity.attributes.target_temp_high) + step)
                        };
                      }
                      // Otherwise use single-setpoint (temperature)
                      else if (entity.attributes.temperature != null) {
                        return {
                          temperature: parseFloat(entity.attributes.temperature) + step
                        };
                      }
                      // Fallback
                      return {};
                    ]]]
                state:
                  - operator: "template"
                    value: >
                      [[[
                        return (entity.attributes.hvac_action == 'cooling' || entity.attributes.hvac_action == 'heating') && variables.ulm_card_thermostat_enable_background_color
                      ]]]
