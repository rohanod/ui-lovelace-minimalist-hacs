                img_cell:
                  - background-color: >-
                      [[[
                        if (variables.ulm_custom_card_esh_room_light_entity) {
                          var color = states[variables.ulm_custom_card_esh_room_light_entity].attributes.rgb_color;
                          if (color && variables.ulm_card_dynamic_color) {
