  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/title/card_title.yaml
  ### Card Title ###
  card_title:
    tap_action:
      action: "none"
    show_icon: false
    show_label: true
    show_name: true
    styles:
      card:
        - background-color: "rgba(0,0,0,0)"
