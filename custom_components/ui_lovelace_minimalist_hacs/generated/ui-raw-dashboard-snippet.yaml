  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/chips/chip_short_date_with_day.yaml
  chip_short_date_with_day:
    template: "chips"
    variables:
      ulm_language: >
        [[[
          return hass["language"];
        ]]]
    triggers_update: "all"
    label: |
      [[[
        var locale = variables.ulm_language;
        let dt = new Intl.DateTimeFormat(locale , {
          weekday: "short",
          day: "numeric",
          month: "short"
        });
        let formatted_date = dt.format(Date.now())
        return formatted_date
      ]]]

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/chips/chip_temperature.yaml
  ### Chip Temperature ###
  chip_temperature:
    template:
      - "chips"
      - "ulm_actions_card"
    variables:
      ulm_card_weather_enable_popup: false
    triggers_update:
      - "[[[ return variables.ulm_chip_temperature_weather ]]]"
      - "[[[ return variables.ulm_chip_temperature_outside ]]]"
      - "[[[ return variables.ulm_chip_temperature_inside ]]]"
    label: |
      [[[
        var state = states[variables.ulm_chip_temperature_weather].state;
        var icon = {
          "clear-night": "🌙",
          "cloudy": "☁️",
          "exceptional": "🌞",
          "fog": "🌫️",
          "hail": "⛈️",
          "lightning": "⚡",
          "lightning-rainy": "⛈️",
          "partlycloudy": "⛅",
          "pouring": "🌧️",
          "rainy": "💧",
          "snowy": "❄️",
          "snowy-rainy": "🌨️",
          "sunny": "☀️",
          "windy": "🌪️",
          "default": "🌡️"
          }
        function convertTemperature(temp) {
          if (parseFloat(temp) == temp && Math.floor(temp) != temp) {
              return parseFloat(temp).toFixed(1);
          }
          return temp;
        }
        var outside_temp = states[variables.ulm_chip_temperature_outside].state;
        var inside_temp = null;
        if (variables.ulm_chip_temperature_inside) {
          inside_temp = states[variables.ulm_chip_temperature_inside].state;
        }
        var label = (icon[state] || icon["default"]) + " " + convertTemperature(outside_temp) + "°";
        if (inside_temp) {
          label = label + " / " + convertTemperature(inside_temp) + "°";
        }
        return label;
      ]]]

  # Source: custom_components/ui_lovelace_minimalist/lovelace/ulm_templates/card_templates/chips/chip_weather_date.yaml
  chip_weather_date:
    template: "chips"
    entity: "[[[ return variables.ulm_weather]]]"
    variables:
      ulm_language: >
        [[[
          return hass["language"];
        ]]]
    triggers_update:
      - "[[[ return variables.ulm_weather ]]]"
    tap_action:
      action: "more-info"
    label: |
      [[[
        const event = new Date();
        const options = {month: 'short', day: 'numeric' };
        var locale = variables.ulm_language;
        let formatted_date = event.toLocaleDateString(locale, options);
        var state = states[variables.ulm_weather].state;
        var icon = {
          "clear-night": "🌙",
          "cloudy": "☁️",
          "exceptional": "🌞",
          "fog": "🌫️",
          "hail": "⛈️",
          "lightning": "⚡",
          "lightning-rainy": "⛈️",
          "partlycloudy": "⛅",
          "pouring": "🌧️",
          "rainy": "💧",
          "snowy": "❄️",
          "snowy-rainy": "🌨️",
          "sunny": "☀️",
          "windy": "🌪️",
          "default": "🌡️"
          }
        return (icon[state] || icon["default"]) + ' ' + formatted_date
      ]]]

