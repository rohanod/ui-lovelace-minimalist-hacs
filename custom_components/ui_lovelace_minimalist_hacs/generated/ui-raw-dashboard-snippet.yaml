              - font-size: "12px"
              - line-height: "14px"
              - background-color: >
                  [[[
                    return "rgba(var(--color-red),1)";
                  ]]]
    styles:
      icon:
        - color: "rgba(var(--color-theme),0.2)"
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-weight: "bold"
        - font-size: "12px"
