              - padding-bottom: "8px"
      item3:
        card:
          type: "custom:button-card"
          show_icon: true
          show_label: true
          show_name: true
          show_entity_picture: false
          name: "[[[ return variables.ulm_translation_scenes ]]]"
          icon: "mdi:dots-vertical"
