  custom_widget_nik_tablet:
    show_label: true
    show_icon: false
    label: |
      [[[
        if (entity.attributes.unit_of_measurement) {
          var unit = entity.attributes.unit_of_measurement != null ? ' ' + entity.attributes.unit_of_measurement: ''
          return entity.state + unit;
        } else {
          return entity.state;
        }
      ]]]
    styles:
      name:
        - justify-self: "center"
        - align-self: "start"
        - font-weight: "bolder"
        - font-size: "12px"
        - filter: "opacity(40%)"
      label:
        - margin-top: "10px"
        - justify-self: "center"
        - font-weight: "bold"
        - font-size: "14px"
      grid:
        - grid-template-areas: "'l' 'n'"
        - grid-template-columns: "1fr"
        - grid-template-rows: "min-content min-content"
      card:
        - box-shadow: "none"

  custom_bar_card_nik_tablet:
    triggers_update: "all"
    styles:
      grid:
        - grid-template-areas: "'item1' 'item2'"
        - grid-template-rows: "1fr"
      card:
        - border-radius: "none"
        - background-color: "transparent"
        - box-shadow: "none"
        - padding: "0px"
    custom_fields:
      item1:
        card:
          type: "custom:button-card"
          entity: "[[[ return variables.ulm_custom_bar_card_nik_tablet_card_entity ]]]"
          template:
            - "icon_info"
            - "card_generic"
          variables:
            ulm_card_generic_name: "[[[ return variables.ulm_custom_bar_card_nik_tablet_card_name != '' ? variables.ulm_custom_bar_card_nik_tablet_card_name : '' ]]]"
          styles:
            card:
              - box-shadow: "none"
              - border-radius: "none"
              - padding: "12px"
      item2:
        card:
          type: "custom:bar-card"
          entities:
            - entity: "[[[ return variables.ulm_custom_bar_card_nik_tablet_card_entity ]]]"
          positions:
            icon: "off"
            indicator: "[[[ return variables.ulm_custom_bar_card_nik_tablet_card_indicator == true ? 'inside' : 'off' ]]]"
            minmax: "off"
            title: "off"
            value: "[[[ return variables.ulm_custom_bar_card_nik_tablet_card_value == true ? 'inside' : 'off' ]]]"
            name: "off"
          severity:
            - color: "var(--google-red)"
              from: 1
              to: 30
            - color: "var(--google-yellow)"
              from: 31
              to: 59
            - color: "var(--google-green)"
              from: 60
              to: 100
          min: 1
          max: 100
          style: |-
            bar-card-currentbar {
