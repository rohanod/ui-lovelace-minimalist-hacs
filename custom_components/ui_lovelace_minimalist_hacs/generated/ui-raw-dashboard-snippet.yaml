        - align-self: "end"
        - font-weight: "bold"
        - font-size: "18px"
        - margin-left: "12px"
        - margin-bottom: "[[[ return !variables?.entity_1 ? (!variables?.entity_2 ? '15.8%' : '24%') : '10%'; ]]]"
        - max-width: "[[[ return `calc(100% - (12px + ${!variables?.entity_2 ? 5 : 0}px))`; ]]]"
        - text-overflow: "ellipsis"
        - overflow: "hidden"
      state:
        - justify-self: "start"
