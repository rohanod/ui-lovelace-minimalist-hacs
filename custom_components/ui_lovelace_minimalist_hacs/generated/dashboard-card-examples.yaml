# These examples are for the helper dashboard card itself.
# Button-card templates such as battery_info still require the generated
# button_card_templates block from dist/ui-raw-dashboard-snippet.yaml.

# Basic status card
type: custom:ui-lovelace-minimalist-hacs

---
# Show a curated list of installed templates
type: custom:ui-lovelace-minimalist-hacs
title: Minimalist templates
mode: templates
templates:
  - card_light
  - card_room
  - card_person
  - card_media_player
  - card_power_outlet
  - card_weather
  - chip_icon_state
  - chip_temperature

---
# Show pasteable card examples on the dashboard
type: custom:ui-lovelace-minimalist-hacs
title: Minimalist examples
mode: examples
examples:
  - title: Dimmable light
    yaml: |
      type: custom:button-card
      template: card_light
      entity: light.living_room
      variables:
        ulm_card_light_enable_slider: true
  - title: Room
    yaml: |
      type: custom:button-card
      template: card_room
      name: Living Room
      entity: light.living_room
      variables:
        label_use_brightness: true
  - title: Person
    yaml: |
      type: custom:button-card
      template: card_person
      entity: person.rohan
      variables: {}
