<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minimalist Standalone YAML Builder</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #181b20;
        --panel-2: #20242b;
        --field: #111419;
        --text: #f2f4f7;
        --muted: #9aa4b2;
        --line: #303641;
        --accent: #69a7ff;
        --accent-2: #7ee3c3;
        --warning: #ffd166;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        display: grid;
        grid-template-columns: minmax(390px, 0.9fr) minmax(460px, 1.1fr);
        gap: 18px;
        width: min(1360px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 22px 0;
      }

      header {
        grid-column: 1 / -1;
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 16px;
      }

      h1, h2, h3 { margin: 0; letter-spacing: 0; }
      h1 { font-size: 24px; line-height: 1.2; }
      h2 { font-size: 14px; line-height: 1.3; }
      h3 { font-size: 12px; color: var(--muted); font-weight: 750; text-transform: uppercase; }

      .subtle {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      section {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 13px 15px;
      }

      .content {
        display: grid;
        gap: 15px;
        padding: 15px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--field);
        color: var(--text);
        font: inherit;
        font-size: 14px;
        outline: none;
        padding: 10px 11px;
      }

      textarea {
        min-height: 520px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        line-height: 1.42;
        tab-size: 2;
      }

      input:focus, textarea:focus, select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(105, 167, 255, 0.18);
      }

      button {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 750;
        padding: 0 12px;
      }

      button.primary {
        border-color: rgba(105, 167, 255, 0.4);
        background: var(--accent);
        color: #07111f;
      }

      button.icon {
        width: 36px;
        padding: 0;
      }

      button:hover { filter: brightness(1.08); }

      .combo { position: relative; }

      .combo-panel {
        position: absolute;
        z-index: 20;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        max-height: 310px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111419;
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
      }

      .combo.open .combo-panel { display: block; }

      .option {
        display: grid;
        gap: 3px;
        width: 100%;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
      }

      .option:hover, .option.active { background: rgba(105, 167, 255, 0.13); filter: none; }
      .option small { color: var(--muted); font-size: 11px; font-weight: 600; }

      .row {
        display: grid;
        grid-template-columns: minmax(150px, 0.8fr) minmax(180px, 1fr) 108px 36px;
        gap: 8px;
        align-items: start;
      }

      .variables {
        display: grid;
        gap: 10px;
      }

      .note {
        border: 1px solid rgba(255, 209, 102, 0.24);
        border-radius: 6px;
        background: rgba(255, 209, 102, 0.08);
        color: #ffe1a0;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--field);
        color: var(--muted);
        font-size: 12px;
        padding: 6px 9px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status {
        min-height: 18px;
        color: var(--accent-2);
        font-size: 12px;
      }

      code { color: var(--accent-2); }

      @media (max-width: 940px) {
        main { grid-template-columns: 1fr; }
        .row { grid-template-columns: 1fr; }
        button.icon { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Minimalist Standalone YAML Builder</h1>
          <div class="subtle">Generate one paste-ready <code>custom:button-card</code> config with Minimalist styles bundled in.</div>
        </div>
        <div class="subtle" id="template-count">Loading templates...</div>
      </header>

      <section>
        <div class="section-head">
          <h2>Card Input</h2>
          <button id="reset" type="button">Reset</button>
        </div>
        <div class="content">
          <label>
            Template
            <div class="combo" id="template-combo">
              <input id="template" placeholder="Search templates..." autocomplete="off" />
              <div class="combo-panel" id="template-options"></div>
            </div>
          </label>

          <label>
            Entity
            <input id="entity" placeholder="light.living_room or sensor.hp_printer_status" autocomplete="off" />
          </label>

          <div class="note" id="dependency-note">
            Output always requires <code>custom:button-card</code>. Functional nested cards are listed here when selected.
          </div>

          <div class="section-head" style="margin: 2px -15px 0; border-top: 1px solid var(--line);">
            <h2>Variables</h2>
            <button id="add-variable" type="button">Add variable</button>
          </div>

          <label>
            Add From Template Docs
            <div class="combo" id="variable-combo">
              <input id="variable-search" placeholder="Search variables for selected template..." autocomplete="off" />
              <div class="combo-panel" id="variable-options"></div>
            </div>
          </label>

          <div class="variables" id="variables"></div>

          <div class="actions">
            <button id="add-required" type="button">Add required variables</button>
            <button id="printer-preset" type="button">Printer cartridge preset</button>
            <button id="clear-variables" type="button">Clear variables</button>
          </div>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>Standalone YAML</h2>
          <button id="copy" class="primary" type="button">Copy</button>
        </div>
        <div class="content">
          <div class="chips" id="summary"></div>
          <textarea id="output" spellcheck="false"></textarea>
          <div class="status" id="status"></div>
        </div>
      </section>
    </main>

    <script type="module">
      const state = {
        entries: [],
        data: { templates: {}, theme: {} },
        variables: [],
      };

      const els = {
        template: document.querySelector("#template"),
        templateCombo: document.querySelector("#template-combo"),
        templateOptions: document.querySelector("#template-options"),
        variableSearch: document.querySelector("#variable-search"),
        variableCombo: document.querySelector("#variable-combo"),
        variableOptions: document.querySelector("#variable-options"),
        entity: document.querySelector("#entity"),
        variables: document.querySelector("#variables"),
        dependencyNote: document.querySelector("#dependency-note"),
        output: document.querySelector("#output"),
        status: document.querySelector("#status"),
        summary: document.querySelector("#summary"),
        templateCount: document.querySelector("#template-count"),
      };

      const clone = (value) => value === undefined ? undefined : JSON.parse(JSON.stringify(value));
      const isObject = (value) => value !== null && typeof value === "object" && !Array.isArray(value);
      const asTemplateList = (template) => !template ? [] : Array.isArray(template) ? template : [template];
      const isTemplateString = (value) => typeof value === "string" && value.trim().startsWith("[[[");
      const isLiteralTemplateName = (value) => typeof value === "string" && !isTemplateString(value);
      const isParentEntityTemplate = (value) => isTemplateString(value) && value.includes("entity.entity_id");

      function mergeConfig(base, override) {
        if (!isObject(base) || !isObject(override)) return clone(override);
        const merged = clone(base);
        for (const [key, value] of Object.entries(override)) {
          if (value === undefined) continue;
          merged[key] = isObject(merged[key]) && isObject(value) ? mergeConfig(merged[key], value) : clone(value);
        }
        return merged;
      }

      function referencedTemplatesInString(value) {
        if (!isTemplateString(value) || !value.includes("icon_info")) return [];
        return [...value.matchAll(/["']([A-Za-z0-9_ -]+)["']/g)]
          .map((match) => match[1])
          .filter((name, index, names) => state.data.templates[name] && names.indexOf(name) === index);
      }

      function resolveButtonCardConfig(config, stack = []) {
        let resolved = {};
        for (const templateName of asTemplateList(config.template)) {
          if (!isLiteralTemplateName(templateName)) continue;
          if (!state.data.templates[templateName]) throw new Error(`Missing bundled template: ${templateName}`);
          if (stack.includes(templateName)) throw new Error(`Circular template reference: ${[...stack, templateName].join(" -> ")}`);
          resolved = mergeConfig(resolved, resolveButtonCardConfig(state.data.templates[templateName], [...stack, templateName]));
        }
        const ownConfig = clone(config);
        delete ownConfig.template;
        return mergeConfig(resolved, ownConfig);
      }

      function convertNestedButtonCards(value, inheritedEntity) {
        if (Array.isArray(value)) return value.map((item) => convertNestedButtonCards(item, inheritedEntity));
        if (!isObject(value)) return value;
        const configuredEntity = value.entity ?? value.entity_id;
        const ownEntity = typeof configuredEntity === "string" && !isTemplateString(configuredEntity) ? configuredEntity : inheritedEntity;
        const nestedTemplates = asTemplateList(value.template);
        const literalTemplates = nestedTemplates.filter(isLiteralTemplateName);
        const referencedTemplates = nestedTemplates.flatMap(referencedTemplatesInString);
        if (value.type === "custom:button-card" && (literalTemplates.length || referencedTemplates.length)) {
          const converted = clone(value);
          if (isParentEntityTemplate(converted.entity) && ownEntity) converted.entity = ownEntity;
          if (!converted.entity && !converted.entity_id && ownEntity) converted.entity = ownEntity;
          if (referencedTemplates.length) converted.template = [...referencedTemplates, ...literalTemplates];
          const resolved = resolveButtonCardConfig(converted);
          if (referencedTemplates.length && converted.state === undefined) delete resolved.state;
          resolved.type = "custom:button-card";
          return convertNestedButtonCards(resolved, ownEntity);
        }
        const resolved = {};
        for (const [key, nestedValue] of Object.entries(value)) resolved[key] = convertNestedButtonCards(nestedValue, ownEntity);
        return resolved;
      }

      function selectedEntry() {
        return state.entries.find((entry) => entry.name === els.template.value.trim());
      }

      function variableInfo() {
        return selectedEntry()?.variables ?? [];
      }

      function inferType(value) {
        if (value === undefined || value === "") return "string";
        if (/^(true|false)$/i.test(value)) return "boolean";
        if (/^-?\d+(\.\d+)?$/.test(value)) return "number";
        if ((value.startsWith("[") && value.endsWith("]")) || (value.startsWith("{") && value.endsWith("}"))) return "json";
        return "string";
      }

      function defaultValueFor(info) {
        if (!info?.default || info.default === "friendly_name") return "";
        return info.default;
      }

      function addVariable(name = "", value = "", type = "string") {
        const existing = state.variables.find((item) => item.key === name && name);
        if (existing) return;
        state.variables.push({ key: name, value, type });
        renderVariables();
        renderYaml();
      }

      function parseVariableValue(raw, type) {
        if (type === "boolean") return raw === true || raw === "true";
        if (type === "number") return Number(raw);
        if (type === "json") return JSON.parse(raw || "null");
        return raw;
      }

      function quoteString(value) {
        if (value === "") return '""';
        if (/^(true|false|null|~)$/i.test(value)) return JSON.stringify(value);
        if (/^-?\d+(\.\d+)?$/.test(value)) return JSON.stringify(value);
        if (/[:#{}\[\],&*?|\-<>=!%@`]/.test(value) || value.trim() !== value) return JSON.stringify(value);
        return value;
      }

      const indent = (level) => "  ".repeat(level);

      function yamlPair(key, value, level) {
        if ((Array.isArray(value) && value.length) || (value && typeof value === "object" && Object.keys(value).length)) {
          return `${indent(level)}${key}:\n${yamlValue(value, level + 1)}`;
        }
        return `${indent(level)}${key}: ${yamlValue(value, level).trimStart()}`;
      }

      function yamlValue(value, level = 0) {
        if (Array.isArray(value)) {
          if (!value.length) return "[]";
          return value.map((item) => {
            if (item && typeof item === "object" && !Array.isArray(item)) {
              const entries = Object.entries(item);
              if (!entries.length) return `${indent(level)}- {}`;
              const [first, ...rest] = entries;
              return [
                `${indent(level)}- ${first[0]}: ${yamlValue(first[1], level + 1).trimStart()}`,
                ...rest.map(([key, child]) => yamlPair(key, child, level + 1)),
              ].join("\n");
            }
            return `${indent(level)}- ${yamlValue(item, level + 1).trimStart()}`;
          }).join("\n");
        }
        if (value && typeof value === "object") {
          const entries = Object.entries(value);
          if (!entries.length) return "{}";
          return entries.map(([key, child]) => yamlPair(key, child, level)).join("\n");
        }
        if (typeof value === "boolean" || typeof value === "number") return String(value);
        if (value === null) return "null";
        return quoteString(String(value));
      }

      function themeStyleEntries() {
        return Object.entries(state.data.theme).map(([key, value]) => ({ [`--${key}`]: value }));
      }

      function applyThemeDefaults(config) {
        const themed = clone(config);
        themed.styles = isObject(themed.styles) ? themed.styles : {};
        themed.styles.card = Array.isArray(themed.styles.card) ? [...themeStyleEntries(), ...themed.styles.card] : themeStyleEntries();
        return themed;
      }

      function standaloneConfig() {
        const templateName = els.template.value.trim();
        if (!templateName) return null;
        const entity = els.entity.value.trim();
        const variables = {};
        for (const variable of state.variables.filter((item) => item.key.trim())) {
          variables[variable.key.trim()] = parseVariableValue(variable.value, variable.type);
        }
        const base = {
          template: templateName,
          type: "custom:button-card",
          ...(entity ? { entity } : {}),
          variables: {
            ulm_language: "en",
            ...variables,
          },
        };
        const resolved = resolveButtonCardConfig(base);
        const converted = convertNestedButtonCards(resolved, resolved.entity);
        converted.type = "custom:button-card";
        return applyThemeDefaults(converted);
      }

      function renderTemplateOptions() {
        const query = els.template.value.trim().toLowerCase();
        const matches = state.entries
          .filter((entry) => !query || `${entry.name} ${entry.category} ${entry.source}`.toLowerCase().includes(query))
          .slice(0, 80);
        els.templateOptions.replaceChildren(...matches.map((entry) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option";
          button.innerHTML = `<strong>${entry.name}</strong><small>${entry.category} · ${entry.source}</small>`;
          button.addEventListener("click", () => {
            els.template.value = entry.name;
            els.templateCombo.classList.remove("open");
            els.variableSearch.value = "";
            renderVariableOptions();
            renderYaml();
          });
          return button;
        }));
      }

      function renderVariableOptions() {
        const query = els.variableSearch.value.trim().toLowerCase();
        const selected = new Set(state.variables.map((item) => item.key));
        const matches = variableInfo()
          .filter((info) => !selected.has(info.name))
          .filter((info) => !query || `${info.name} ${info.notes ?? ""}`.toLowerCase().includes(query))
          .slice(0, 80);
        els.variableOptions.replaceChildren(...matches.map((info) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option";
          const required = info.required ? "required" : "optional";
          button.innerHTML = `<strong>${info.name}</strong><small>${required}${info.default ? ` · default: ${info.default}` : ""}${info.notes ? ` · ${info.notes}` : ""}</small>`;
          button.addEventListener("click", () => {
            addVariable(info.name, defaultValueFor(info), inferType(defaultValueFor(info)));
            els.variableSearch.value = "";
            els.variableCombo.classList.remove("open");
            renderVariableOptions();
          });
          return button;
        }));
      }

      function renderVariables() {
        els.variables.replaceChildren(...state.variables.map((variable, index) => {
          const row = document.createElement("div");
          row.className = "row";
          const key = document.createElement("input");
          key.value = variable.key;
          key.placeholder = "variable";
          const value = document.createElement(variable.type === "json" ? "textarea" : "input");
          value.value = String(variable.value);
          value.placeholder = "value";
          if (variable.type === "json") value.style.minHeight = "120px";
          const type = document.createElement("select");
          for (const name of ["string", "boolean", "number", "json"]) {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            type.append(option);
          }
          type.value = variable.type;
          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "icon";
          remove.textContent = "x";
          key.addEventListener("input", () => { variable.key = key.value; renderYaml(); });
          value.addEventListener("input", () => { variable.value = value.value; renderYaml(); });
          type.addEventListener("input", () => { variable.type = type.value; renderVariables(); renderYaml(); });
          remove.addEventListener("click", () => { state.variables.splice(index, 1); renderVariables(); renderVariableOptions(); renderYaml(); });
          row.append(key, value, type, remove);
          return row;
        }));
      }

      function renderDependencyNote() {
        const entry = selectedEntry();
        const deps = ["button-card", ...(entry?.dependencies ?? [])].filter((dep, index, all) => all.indexOf(dep) === index);
        els.dependencyNote.innerHTML = `Required custom card resource(s): ${deps.map((dep) => `<code>custom:${dep}</code>`).join(", ")}. Minimalist theme variables are embedded in the generated YAML.`;
      }

      function renderSummary(config) {
        const entry = selectedEntry();
        const chips = [
          `${entry?.variables?.length ?? 0} known variables`,
          `${Object.keys(state.data.theme).length} theme vars embedded`,
          `${entry?.dependencies?.length ?? 0} functional deps`,
        ];
        if (config) chips.push(`${JSON.stringify(config).length} chars`);
        els.summary.replaceChildren(...chips.map((text) => {
          const span = document.createElement("span");
          span.className = "chip";
          span.textContent = text;
          return span;
        }));
      }

      function renderYaml() {
        renderTemplateOptions();
        renderVariableOptions();
        renderDependencyNote();
        try {
          const config = standaloneConfig();
          els.output.value = config ? `${yamlValue(config)}\n` : "type: custom:button-card\n";
          renderSummary(config);
        } catch (error) {
          els.output.value = `# ${error.message}\n`;
          renderSummary(null);
        }
      }

      async function loadData() {
        const [entries, data] = await Promise.all([
          fetch("../dist/template-index.json").then((res) => res.json()),
          fetch("../dist/template-data.json").then((res) => res.json()),
        ]);
        state.entries = entries.filter((entry) => entry.directUse);
        state.data = data;
        els.templateCount.textContent = `${state.entries.length} direct-use templates`;
      }

      document.addEventListener("click", (event) => {
        if (!els.templateCombo.contains(event.target)) els.templateCombo.classList.remove("open");
        if (!els.variableCombo.contains(event.target)) els.variableCombo.classList.remove("open");
      });
      els.template.addEventListener("focus", () => { els.templateCombo.classList.add("open"); renderTemplateOptions(); });
      els.template.addEventListener("input", () => { els.templateCombo.classList.add("open"); renderYaml(); });
      els.variableSearch.addEventListener("focus", () => { els.variableCombo.classList.add("open"); renderVariableOptions(); });
      els.variableSearch.addEventListener("input", () => { els.variableCombo.classList.add("open"); renderVariableOptions(); });
      els.entity.addEventListener("input", renderYaml);
      document.querySelector("#add-variable").addEventListener("click", () => addVariable());
      document.querySelector("#add-required").addEventListener("click", () => {
        for (const info of variableInfo().filter((item) => item.required)) addVariable(info.name, defaultValueFor(info), inferType(defaultValueFor(info)));
      });
      document.querySelector("#clear-variables").addEventListener("click", () => { state.variables = []; renderVariables(); renderVariableOptions(); renderYaml(); });
      document.querySelector("#printer-preset").addEventListener("click", () => {
        els.template.value = "custom_card_sisimomo_printer";
        els.entity.value = "sensor.hp_printer_status";
        state.variables = [
          { key: "printer_name", value: "HP LaserJet MFP M28w", type: "string" },
          { key: "cartridges", type: "json", value: JSON.stringify([
            { label: "C", entity_id: "sensor.hp_printer_cyan_ink", type: "unicolor", color: "#427EDE" },
            { label: "M", entity_id: "sensor.hp_printer_magenta_ink", type: "unicolor", color: "#F84B7A" },
            { label: "Y", entity_id: "sensor.hp_printer_yellow_ink", type: "unicolor", color: "rgba(var(--color-yellow), 1)" },
            { label: "K", entity_id: "sensor.hp_printer_black_ink", type: "unicolor", color: "black" },
          ], null, 2) },
        ];
        renderVariables();
        renderYaml();
      });
      document.querySelector("#reset").addEventListener("click", () => {
        els.template.value = "";
        els.entity.value = "";
        state.variables = [];
        renderVariables();
        renderYaml();
      });
      document.querySelector("#copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(els.output.value);
        els.status.textContent = "Copied standalone YAML.";
        setTimeout(() => { els.status.textContent = ""; }, 1600);
      });

      await loadData();
      renderVariables();
      renderYaml();
    </script>
  </body>
</html>
